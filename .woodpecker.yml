when:
  - event: push
  - event: pull_request

steps:
  validate:
    image: python:3.12-slim
    commands:
      - apt-get update -qq && apt-get install -y -qq shellcheck
      - |
        for f in configs/*.json; do
          echo "Validating $f"
          python3 -m json.tool "$f" > /dev/null
        done
      - shellcheck configs/*.sh
